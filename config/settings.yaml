# ═══════════════════════════════════════════════════════════════
# 11. 纸上交易配置 — 虚拟盘参数（不接实盘时的增强方案）
# ═══════════════════════════════════════════════════════════════
paper_trading:
  poll_interval_seconds: 5         # 实时行情轮询间隔
  trading_hours:
    morning: ["09:30", "11:30"]
    afternoon: ["13:00", "15:00"]
  default_cash: 100000.0           # 每策略默认初始资金
  daemon:
    poll_interval: 5               # 行情轮询间隔(秒)
    report_dir: "reports/paper"    # 周期性报告存储目录
    daily_report_time: "15:30"     # 每日收盘后生成报告时间
    auto_resume: true              # 启动时自动恢复未完成实例
    max_instances: 20              # 最多同时运行实例数
  league:
    default_strategies: ["双均线交叉", "布林带回归", "海龟交易法则"]
    leaderboard_top_n: 10


# ═══════════════════════════════════════════════════════════════
# 12. Kronos 量化K线预测模型 — 自回归Transformer价格预测
# ═══════════════════════════════════════════════════════════════
# Kronos 是一个基于 BSQ(Binary Spherical Quantization)离散token
# 的自回归Transformer，将K线数据编码为分层token后预测未来价格序列。
# 项目地址: https://github.com/NeoQuasar/Kronos
kronos:
  # 模型选择
  model: small                   # mini(4M)/small(25M)/base(102M)
  device: auto                   # auto/cuda/mps/cpu
  max_context: 512               # 模型最大上下文窗口(token数)
  cache_ttl: 3600                # 推理结果缓存有效期(秒)，0=禁用

  # 功能开关 — 所有Kronos功能默认关闭，需在 settings.local.yaml 手动开启
  source_enabled: false          # 信号源节点总开关
  factor_registration: false     # 因子自动入库开关(P3)
  l4_agent: false                # L4 Agent决策接入开关(P3)
  risk_guard: false              # guardian风险预警接入开关(P3)
  webui_enabled: false           # WebUI预测可视化开关(P3)
  token_analysis: false          # Token熵分析开关(P3)

  # 预测参数
  pred_len: 20                   # 默认预测步数(K线根数)
  T: 1.0                         # 采样温度(>1=更随机，<1=更确定)
  top_p: 0.9                     # nucleus sampling概率阈值
  top_k: 0                       # top-k采样(0=禁用)
  sample_count: 5                # 蒙特卡洛采样次数(>1取平均降低方差)
  lookback: 60                   # 默认回看窗口(K线根数)

  # 因子参数
  ic_threshold: 0.03             # 因子IC最低阈值(|IC|>此值入库+创建Track)

  # 模型路径(为空则从 HuggingFace Hub 自动下载)
  tokenizer_path: ""             # 本地tokenizer路径，留空="NeoQuasar/Kronos-Tokenizer-base"
  model_path: ""                 # 本地模型路径，留空=按model大小自动选择HF repo
  project_path: ""               # Kronos项目根目录(需pip install或克隆后指定路径)
